services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Baked into the Next.js standalone bundle at build time.
        # Must be the address the end-user's browser can reach the backend on.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      # Expose to the Node server process as well (used by server-side fetch).
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3000}
